name: Publish cans-lreq on /TR

on:
  workflow_dispatch:

jobs:
  publish-TR:
    name: Publish cans-lreq
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: w3c/spec-prod@v2
        with:
          TOOLCHAIN: respec
          SOURCE: cans/index.html
          W3C_ECHIDNA_TOKEN: ${{ secrets.TR_TOKEN_CANS_LREQ }}
          W3C_WG_DECISION_URL: 
          W3C_BUILD_OVERRIDE: |
            specStatus: DNOTE
            shortname: cans-lreq
